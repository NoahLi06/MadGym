# Publishes `dist/` to the `gh-pages` branch (no deploy-pages API — avoids 404 if
# “GitHub Actions” wasn’t enabled under Settings → Pages).
#
# After the first successful run:
#   Repo → Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
# Site: https://noahli06.github.io/HustlerFit/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
